<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure UPI Payment</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .payment-card {
            background: #fff;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }
        .amount {
            font-size: 28px;
            font-weight: bold;
            color: #2d3748;
            margin: 10px 0;
        }
        .qr-box {
            background: #e2e8f0;
            padding: 20px;
            border-radius: 10px;
            margin: 20px 0;
            display: inline-block;
        }
        .qr-placeholder {
            width: 200px;
            height: 200px;
            background: #cbd5e1;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 14px;
            color: #64748b;
        }
        .btn-pay {
            display: block;
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            color: white;
            background: #10b981;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
        }
        .btn-upi {
            background: #3b82f6;
        }
    </style>
</head>
<body>

<div class="payment-card">
    <h2>Complete Your Payment</h2>
    <p>Scan QR code or click below to pay</p>
    
    <div class="amount">₹189</div>

    <div class="qr-box">
        <!-- Yahan aap apna UPI QR code image daal sakte hain -->
        <div class="qr-placeholder">[ UPI QR Code Here ]</div>
    </div>

    <!-- Direct UPI App Links -->
    <a href="upi://pay?pa=victom@slc&pn=Website&am=189&cu=INR" class="btn-pay btn-upi">Pay via UPI App</a>
<a href="thankyou.html" class="btn-pay" style="background: #2563eb; margin-top: 15px; text-decoration: none; display: block;">I have paid successfully</a>

    
    <p style="font-size: 12px; color: #94a3b8; margin-top: 20px;">Safe & Secure 256-bit Encryption</p>
</div>

</body>
</html>

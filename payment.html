
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment - ApkaSaathi</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    body { background-color: #f4f7fe; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
    .payment-card { background: #ffffff; padding: 30px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); text-align: center; max-width: 400px; width: 100%; }
    .title { font-size: 24px; font-weight: 700; color: #111; margin-bottom: 8px; }
    .subtitle { font-size: 14px; color: #666; margin-bottom: 20px; }
    .amount { font-size: 36px; font-weight: 800; color: #1e293b; margin-bottom: 24px; }
    .qr-container { background: #f8fafc; border: 2px dashed #e2e8f0; border-radius: 12px; padding: 16px; margin-bottom: 24px; display: flex; justify-content: center; align-items: center; }
    .qr-container img { width: 100%; max-width: 260px; height: auto; border-radius: 8px; display: block; }
    .btn { display: block; width: 100%; padding: 14px; margin-bottom: 12px; border-radius: 8px; font-size: 16px; font-weight: 600; text-decoration: none; text-align: center; border: none; cursor: pointer; transition: all 0.2s ease; }
    .btn-upi { background-color: #2563eb; color: #ffffff; }
    .btn-upi:hover { background-color: #1d4ed8; }
    .btn-paid { background-color: #16a34a; color: #ffffff; }
    .btn-paid:hover { background-color: #15803d; }
    .footer-text { font-size: 12px; color: #94a3b8; margin-top: 16px; }
  </style>
</head>
<body>

  <div class="payment-card">
    <h2 class="title">Complete Your Payment</h2>
    <p class="subtitle">Scan QR code or click below to pay</p>
    
    <div class="amount">₹189</div>

    <div class="qr-container">
      <img src="qr.jpg" alt="UPI QR Code">
    </div>

    <a href="upi://pay?pa=victom@slc&pn=Prakash%20Kumar&am=189&cu=INR" class="btn btn-upi">Pay via UPI App</a>
    <a href="thankyou.html" class="btn btn-paid">I Have Paid Successfully</a>

    <p class="footer-text">Safe & Secure 256-bit Encryption</p>
  </div>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Successful</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .success-card {
            background: #fff;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }
        .icon {
            font-size: 50px;
            color: #10b981;
            margin-bottom: 15px;
        }
        .btn-download {
            display: inline-block;
            padding: 12px 25px;
            margin-top: 20px;
            color: white;
            background: #2563eb;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="success-card">
    <div class="icon">✓</div>
    <h2>Thank You!</h2>
    <p>Your payment was successful.</p>
    
    <!-- PDF Download Button (Apni file ka naam daalhein) -->
    <a href="your-file.pdf" download class="btn-download">📥 Download Now</a>
</div>

</body>
</html>
